<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Gateway Console</title>
    <style>
      :root {
        --bg: #f4efe3;
        --surface: rgba(255, 251, 245, 0.88);
        --ink: #182126;
        --muted: #59656c;
        --line: rgba(24, 33, 38, 0.12);
        --accent: #bb5e25;
        --teal: #0d7a79;
        --olive: #607436;
        --danger: #9d3e35;
        --shadow: 0 24px 48px rgba(15, 23, 31, 0.12);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        color: var(--ink);
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(187, 94, 37, 0.22), transparent 30%),
          radial-gradient(circle at bottom right, rgba(13, 122, 121, 0.18), transparent 28%),
          linear-gradient(160deg, #f7f2e8 0%, #e6ebdf 100%);
      }
      .app {
        width: min(1320px, calc(100vw - 28px));
        margin: 16px auto 40px;
        display: grid;
        grid-template-columns: 260px 1fr;
        gap: 18px;
      }
      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 24px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }
      .sidebar {
        padding: 24px 18px;
        position: sticky;
        top: 16px;
        height: fit-content;
      }
      .brand {
        font-family: "Iowan Old Style", "Palatino Linotype", serif;
        font-size: 34px;
        line-height: 0.95;
        margin: 0 0 10px;
      }
      .subtle {
        color: var(--muted);
        line-height: 1.55;
        margin: 0 0 16px;
      }
      .nav {
        display: grid;
        gap: 8px;
        margin-top: 20px;
      }
      .nav a {
        display: block;
        text-decoration: none;
        color: var(--ink);
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid transparent;
        background: rgba(255,255,255,0.42);
      }
      .nav a.active {
        background: rgba(13, 122, 121, 0.11);
        border-color: rgba(13, 122, 121, 0.2);
        color: var(--teal);
      }
      .main {
        display: grid;
        gap: 18px;
      }
      .hero {
        padding: 26px;
      }
      .eyebrow {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: var(--teal);
      }
      h1 {
        margin: 10px 0 6px;
        font-family: "Iowan Old Style", "Palatino Linotype", serif;
        font-size: clamp(34px, 5vw, 58px);
        line-height: 0.94;
      }
      .toolbar {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin-top: 18px;
      }
      .toolbar h2 {
        margin: 0;
        font-family: "Iowan Old Style", "Palatino Linotype", serif;
        font-size: 26px;
      }
      button, input, select, textarea {
        font: inherit;
      }
      button {
        border: 0;
        border-radius: 999px;
        background: var(--ink);
        color: #fff;
        padding: 11px 16px;
        cursor: pointer;
      }
      button.secondary {
        background: transparent;
        color: var(--ink);
        border: 1px solid var(--line);
      }
      .section {
        padding: 22px;
      }
      .grid {
        display: grid;
        gap: 16px;
      }
      .stats { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .cards { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .card {
        border-radius: 18px;
        border: 1px solid var(--line);
        background: rgba(255,255,255,0.7);
        padding: 16px;
      }
      .card.good { border-left: 4px solid var(--olive); }
      .card.bad { border-left: 4px solid var(--danger); }
      .label {
        font-size: 12px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .value {
        margin-top: 8px;
        font-size: 28px;
        font-weight: 700;
      }
      .field { display: grid; gap: 6px; }
      .field label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
      input, select, textarea {
        width: 100%;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255,255,255,0.9);
        padding: 12px 14px;
        color: var(--ink);
      }
      textarea {
        min-height: 180px;
        resize: vertical;
        font-family: "SFMono-Regular", Menlo, monospace;
      }
      pre {
        margin: 0;
        padding: 14px;
        background: #162029;
        color: #f0f5f7;
        border-radius: 16px;
        overflow: auto;
        font-family: "SFMono-Regular", Menlo, monospace;
        font-size: 12px;
        line-height: 1.55;
      }
      .split { display: grid; grid-template-columns: 0.95fr 1.05fr; gap: 16px; }
      .stack { display: grid; gap: 16px; }
      @media (max-width: 1040px) {
        .app, .split, .stats, .cards { grid-template-columns: 1fr; }
        .sidebar { position: static; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="panel sidebar">
        <div class="eyebrow">L1 Console</div>
        <div class="brand">Gateway<br/>Control</div>
        <p class="subtle">面向七层体系的运营和调试入口。当前已接入 L2-L7 的最小聚合接口。</p>
        <nav class="nav" id="nav"></nav>
      </aside>
      <main class="main">
        <section class="panel hero">
          <div class="eyebrow" id="route-tag">Dashboard</div>
          <h1 id="route-title">Gateway Console</h1>
          <p class="subtle" id="route-description">统一运营、统一调试、统一观察。</p>
        </section>
        <section class="panel section">
          <div id="view-root"></div>
        </section>
      </main>
    </div>
    <script src="/assets/app.js"></script>
  </body>
</html>
